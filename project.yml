# project.yml — xcodegen configuration for HouseholdApp
# Run `xcodegen generate` from the project root to regenerate HouseholdApp.xcodeproj.
# Install xcodegen: brew install xcodegen

name: HouseholdApp

options:
  bundleIdPrefix: com.householdapp
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug
  createIntermediateGroups: true
  groupSortPosition: none

# ── Swift Package Manager dependencies ────────────────────────────────────────
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"

# ── Targets ────────────────────────────────────────────────────────────────────
targets:
  HouseholdApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    # ── Source files ───────────────────────────────────────────────────────────
    sources:
      - path: HouseholdApp
        excludes:
          - "**/*.entitlements"

    # ── Resources ──────────────────────────────────────────────────────────────
    resources:
      - path: HouseholdApp/Assets.xcassets
      - path: HouseholdApp/Info.plist
      - path: HouseholdApp/GoogleService-Info.plist
        optional: true

    # ── Linked packages ────────────────────────────────────────────────────────
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift

    # ── Build settings ─────────────────────────────────────────────────────────
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.householdapp.app
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: HouseholdApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: HouseholdApp/HouseholdApp.entitlements
        MARKETING_VERSION: "1.1"
        CURRENT_PROJECT_VERSION: "2"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "JBZQM9YC55"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"

    # ── Entitlements ───────────────────────────────────────────────────────────
    entitlements:
      path: HouseholdApp/HouseholdApp.entitlements

# ── Schemes ────────────────────────────────────────────────────────────────────
schemes:
  HouseholdApp:
    build:
      targets:
        HouseholdApp: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
